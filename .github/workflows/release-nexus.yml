name: Upload to Nexus Mods

on:
  release:
    types: [published]

jobs:
  upload-nexus:
    runs-on: ubuntu-latest
    steps:
      - name: Download release zip
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ASSET_NAME=$(gh release view "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --json assets --jq '.assets[] | select(.name | endswith(".zip")) | .name')

          if [ -z "$ASSET_NAME" ]; then
            echo "::error::No .zip asset found in release ${{ github.event.release.tag_name }}"
            exit 1
          fi

          gh release download "${{ github.event.release.tag_name }}" \
            --repo "${{ github.repository }}" \
            --pattern "*.zip"

          # Strip .zip from filename for Nexus (it appends .zip automatically)
          UPLOAD_NAME="${ASSET_NAME%.zip}"
          mv "$ASSET_NAME" "$UPLOAD_NAME"
          echo "UPLOAD_NAME=$UPLOAD_NAME" >> "$GITHUB_ENV"

      - name: Extract version from tag
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"

      - name: Upload to Nexus Mods
        uses: Nexus-Mods/upload-action@v1.0.0-beta.2
        with:
          api_key: ${{ secrets.NEXUSMODS_API_KEY }}
          file_group_id: ${{ secrets.NEXUSMODS_FILE_GROUP_ID }}
          filename: ${{ env.UPLOAD_NAME }}
          version: ${{ env.VERSION }}
          display_name: ${{ env.UPLOAD_NAME }}
          file_category: main
